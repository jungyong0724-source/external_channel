<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=780, initial-scale=1">
<title>CESCO QR 스캔 가이드 배너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#003087;
    --ink:#222222;
    --ink-soft:#444444;
    --gold:#ffcc44;
    --tintblue:#f0f4ff;
    --tintgrey:#f5f5f5;
    --line:#dddddd;
    --frame:#cccccc;
    --live:#ffd60a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:#d9dde2;
    font-family:'Noto Sans KR',sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;min-height:100vh;
  }
  .banner{
    width:780px;height:320px;background:#fff;overflow:hidden;position:relative;color:var(--ink);
  }

  /* ---------- SECTION 1 — TITLE BAR (50px) ---------- */
  .title{
    height:50px;background:var(--navy);
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .title .ico{width:19px;height:19px;flex:none;color:#fff;}
  .title h1{color:#fff;font-size:16px;font-weight:700;letter-spacing:-.6px;white-space:nowrap;}
  .title h1 .em{color:var(--gold);}

  /* ---------- SECTION 2 — TWO COLUMNS (270px) ---------- */
  .cols{height:270px;display:flex;}
  .col{
    flex:1;height:100%;padding:13px 14px 12px;
    display:flex;flex-direction:column;align-items:center;
  }
  .col.android{background:var(--tintblue);border-right:1px solid var(--line);}
  .col.ios{background:var(--tintgrey);}
  .col-head{
    display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700;margin-bottom:11px;
  }
  .col.android .col-head{color:var(--navy);}
  .col.ios .col-head{color:var(--ink);}
  .col-head .gl{width:15px;height:15px;flex:none;}

  .steps{display:flex;align-items:flex-start;justify-content:center;gap:4px;}
  .step{display:flex;flex-direction:column;align-items:center;width:92px;}
  .step .lbl{
    color:var(--gold);font-weight:700;font-size:12px;letter-spacing:.3px;margin-bottom:5px;
    -webkit-text-stroke:.3px #e0a800;
  }
  .step .desc{
    color:var(--ink-soft);font-size:12px;font-weight:400;text-align:center;line-height:1.28;
    margin-top:7px;letter-spacing:-.4px;text-wrap:balance;
  }
  .arrow{
    color:var(--gold);font-size:18px;font-weight:700;flex:none;
    align-self:center;margin-top:62px;line-height:1;
  }

  /* ---------- PHONE FRAME ---------- */
  .phone{
    width:88px;height:150px;border:1.5px solid var(--frame);border-radius:12px;
    background:#fff;overflow:hidden;position:relative;
  }
  .scr{position:absolute;inset:0;border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}

  /* generic UI atoms */
  .bar{background:var(--navy);}
  .imgph{background:repeating-linear-gradient(45deg,#e9edf3,#e9edf3 5px,#eef2f7 5px,#eef2f7 10px);}
  .ln{background:#e3e6ea;border-radius:2px;}
  .ln.dark{background:#cfd4da;}

  /* app page (coupang-style, simplified) */
  .app{display:flex;flex-direction:column;height:100%;background:#fff;}
  .app .top{height:14px;background:var(--navy);display:flex;align-items:center;padding:0 5px;gap:3px;}
  .app .top .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.55);}
  .app .top .sb{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.85);}
  .app .hero{height:52px;margin:6px;border-radius:4px;}
  .app .meta{padding:0 7px;display:flex;flex-direction:column;gap:4px;}
  .app .price{height:8px;width:54%;background:var(--navy);border-radius:2px;}

  /* toast (android screenshot saved) */
  .toast{
    position:absolute;top:20px;left:7px;right:7px;height:16px;background:#2b2f36;border-radius:8px;
    display:flex;align-items:center;gap:4px;padding:0 5px;
  }
  .toast .tt{width:9px;height:9px;border-radius:2px;background:#cfd4da;flex:none;}
  .toast .tl{height:4px;border-radius:2px;background:rgba(255,255,255,.85);flex:1;}

  /* ios thumbnail preview bottom-left */
  .iosthumb{
    position:absolute;left:6px;bottom:7px;width:24px;height:34px;border-radius:4px;
    background:#fff;border:1px solid #cdd2d8;overflow:hidden;
  }
  .iosthumb .mini{position:absolute;inset:2px;border-radius:2px;}

  /* quick settings (android step2) */
  .qs{background:#1f2227;height:100%;padding:7px 6px;display:flex;flex-direction:column;gap:5px;}
  .qs .grip{width:26px;height:3px;border-radius:2px;background:#4a4f57;margin:0 auto 2px;}
  .qs .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .qs .tile{aspect-ratio:1/1;border-radius:7px;background:#363b43;display:flex;align-items:center;justify-content:center;}
  .qs .tile .gly{width:9px;height:9px;border-radius:2px;background:#6b727c;}
  .qs .tile.on{background:#2a3550;outline:2px solid var(--gold);outline-offset:1px;}
  .qs .tile.on .gly{background:transparent;}

  /* scanner (android step3) */
  .scan{background:#15171b;height:100%;position:relative;display:flex;flex-direction:column;}
  .scan .view{flex:1;position:relative;margin:9px;}
  .scan .view .crn{position:absolute;width:11px;height:11px;border:2px solid #fff;}
  .scan .view .tl{top:0;left:0;border-right:0;border-bottom:0;}
  .scan .view .tr{top:0;right:0;border-left:0;border-bottom:0;}
  .scan .view .bl{bottom:0;left:0;border-right:0;border-top:0;}
  .scan .view .br{bottom:0;right:0;border-left:0;border-top:0;}
  .scan .gthumb{position:absolute;right:8px;top:12px;width:20px;height:26px;border-radius:3px;background:#fff;border:1.5px solid var(--gold);overflow:hidden;}
  .scan .gthumb .mini{position:absolute;inset:2px;}
  .scan .tabs{height:22px;display:flex;align-items:center;justify-content:center;gap:14px;background:#1f2227;}
  .scan .tab{font-size:8px;color:#9aa0a8;font-weight:500;padding-bottom:2px;}
  .scan .tab.act{color:#fff;font-weight:700;border-bottom:2px solid var(--gold);}

  /* ios photo + live text (step2) */
  .photo{background:#000;height:100%;position:relative;display:flex;align-items:center;justify-content:center;}
  .photo .sheet{position:absolute;inset:9px;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;}
  .livebox{position:relative;padding:3px;border:2px solid var(--live);border-radius:3px;background:rgba(255,214,10,.10);}
  .pill-link{
    position:absolute;bottom:11px;left:50%;transform:translateX(-50%);
    background:var(--live);color:#1b1b1b;font-size:7px;font-weight:700;
    padding:3px 8px;border-radius:9px;white-space:nowrap;
  }

  /* safari (ios step3) */
  .safari{background:#fff;height:100%;display:flex;flex-direction:column;}
  .safari .addr{height:18px;margin:7px 7px 0;background:#ececec;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:3px;padding:0 6px;}
  .safari .addr .lock{width:6px;height:6px;color:#8a9099;flex:none;}
  .safari .addr .url{font-size:8px;color:#222;font-weight:700;letter-spacing:-.2px;}
  .safari .page{flex:1;margin:6px;display:flex;flex-direction:column;gap:4px;}
  .safari .page .hd{height:18px;border-radius:3px;background:var(--navy);}

  /* QR glyph */
  .qrg{display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:1px;}
  .qrg i{background:transparent;}
  .qrg i.f{background:#fff;}

  /* ===== One UI Quick Settings (android step2) ===== */
  .qs2{background:#a6afad;height:100%;display:flex;flex-direction:column;padding:4px 5px 0;}
  .qs2 .stat{display:flex;justify-content:space-between;align-items:center;padding:0 1px 4px;color:#2e3332;}
  .qs2 .stat .kt{font-size:5px;font-weight:700;}
  .qs2 .stat .bt{font-size:4.6px;font-weight:700;border:.8px solid #2e3332;border-radius:5px;padding:0 2px;}
  .qs2 .pills{display:flex;gap:4px;margin-bottom:5px;}
  .qs2 .pill2{flex:1;height:15px;border-radius:9px;background:rgba(255,255,255,.94);display:flex;align-items:center;gap:3px;padding:0 4px;}
  .qs2 .pill2 .ic{width:10px;height:10px;border-radius:50%;background:#2b2f36;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;}
  .qs2 .pill2 .ic svg{width:6px;height:6px;}
  .qs2 .pill2 .tx{font-size:4.8px;font-weight:700;color:#23262b;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;}
  .qs2 .gridb{display:grid;grid-template-columns:repeat(4,1fr);gap:5px 2px;}
  .qs2 .t{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .qs2 .t .c{width:14px;height:14px;border-radius:50%;background:rgba(40,45,46,.40);display:flex;align-items:center;justify-content:center;color:#eef1f0;}
  .qs2 .t .c svg{width:8px;height:8px;}
  .qs2 .t.lit .c{background:#fafcfb;color:#2b2f36;}
  .qs2 .t.qr .c{outline:2px solid var(--gold);outline-offset:1.5px;}
  .qs2 .t .cap{font-size:4px;color:#26292b;font-weight:600;line-height:1;text-align:center;white-space:nowrap;}
  .qs2 .t.qr .cap{color:#000;font-weight:700;font-size:4.4px;}

  /* ===== real QR scanner (android step3) ===== */
  .scan2{background:#000;height:100%;position:relative;}
  .scan2 .gdot{position:absolute;top:5px;right:6px;width:3px;height:3px;border-radius:50%;background:#1ec773;}
  .scan2 .qtxt{position:absolute;top:14px;left:5px;right:5px;text-align:center;color:#fff;font-size:5.4px;font-weight:700;letter-spacing:-.2px;}
  .scan2 .vf{position:absolute;top:36px;left:18px;right:18px;height:44px;}
  .scan2 .vf .crn{position:absolute;width:12px;height:12px;border:2px solid #fff;border-radius:1px;}
  .scan2 .vf .tl{top:0;left:0;border-right:0;border-bottom:0;border-top-left-radius:5px;}
  .scan2 .vf .tr{top:0;right:0;border-left:0;border-bottom:0;border-top-right-radius:5px;}
  .scan2 .vf .bl{bottom:0;left:0;border-right:0;border-top:0;border-bottom-left-radius:5px;}
  .scan2 .vf .br{bottom:0;right:0;border-left:0;border-top:0;border-bottom-right-radius:5px;}
  .scan2 .btm{position:absolute;bottom:16px;left:0;right:0;display:flex;justify-content:space-between;padding:0 13px;}
  .scan2 .rb{width:19px;height:19px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;color:#fff;}
  .scan2 .rb svg{width:10px;height:10px;}
  .scan2 .rb.img{outline:2px solid var(--gold);outline-offset:2px;}

  /* android nav bar */
  .navbar{position:absolute;bottom:0;left:0;right:0;height:11px;display:flex;align-items:center;justify-content:center;gap:20px;}
  .navbar .nb{color:rgba(255,255,255,.6);}
  .navbar.onlight .nb{color:rgba(40,45,46,.6);}
  .navbar .nb svg{display:block;width:7px;height:7px;}
</style>
</head>
<body>
  <div class="banner" data-screen-label="CESCO Banner 2 (QR Guide)">

    <!-- SECTION 1 — TITLE -->
    <div class="title">
      <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="6" y="2.5" width="12" height="19" rx="2.5" stroke="currentColor" stroke-width="1.8"/>
        <rect x="9.5" y="5" width="5" height="5" fill="currentColor"/>
        <rect x="9.5" y="13.5" width="2" height="2" fill="currentColor"/>
        <rect x="12.5" y="13.5" width="2" height="2" fill="currentColor"/>
        <rect x="9.5" y="16.5" width="2" height="2" fill="currentColor"/>
      </svg>
      <h1>QR코드 스캔 방법 — <span class="em">스크린샷만으로 바로 이동!</span></h1>
    </div>

    <!-- SECTION 2 — TWO COLUMN GUIDE -->
    <div class="cols">

      <!-- ===== ANDROID ===== -->
      <div class="col android">
        <div class="col-head">
          <svg class="gl" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <rect x="5" y="9" width="14" height="9" rx="2"/>
            <rect x="2.5" y="10.5" width="2" height="6" rx="1"/>
            <rect x="19.5" y="10.5" width="2" height="6" rx="1"/>
            <rect x="8" y="17.5" width="2" height="3.5" rx="1"/>
            <rect x="14" y="17.5" width="2" height="3.5" rx="1"/>
            <path d="M7 8.5 C7 4.9 9.2 3 12 3 C14.8 3 17 4.9 17 8.5 Z"/>
            <circle cx="9.5" cy="6" r=".9" fill="#f0f4ff"/>
            <circle cx="14.5" cy="6" r=".9" fill="#f0f4ff"/>
          </svg>
          갤럭시
        </div>
        <div class="steps">
          <!-- step1 -->
          <div class="step">
            <div class="lbl">STEP 1</div>
            <div class="phone"><div class="scr">
              <div class="app">
                <div class="top"><span class="dot"></span><span class="sb"></span></div>
                <div class="hero imgph"></div>
                <div class="meta"><span class="price"></span><span class="ln" style="height:5px;width:80%"></span><span class="ln" style="height:5px;width:60%"></span></div>
              </div>
              <div class="toast"><span class="tt"></span><span class="tl"></span></div>
            </div></div>
            <div class="desc">스크린샷 찍기</div>
          </div>
          <div class="arrow">→</div>
          <!-- step2 -->
          <div class="step">
            <div class="lbl">STEP 2</div>
            <div class="phone"><div class="scr">
              <div class="qs2">
                <div class="stat"><span class="kt">KT</span><span class="bt">91</span></div>
                <div class="pills">
                  <div class="pill2"><span class="ic"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="18" r="1.7"/><path d="M5.5 11a9 9 0 0 1 13 0" stroke="currentColor" stroke-width="2" fill="none"/><path d="M8.5 14a5 5 0 0 1 7 0" stroke="currentColor" stroke-width="2" fill="none"/></svg></span><span class="tx">Wi-Fi</span></div>
                  <div class="pill2"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M8 7l8 10-4 3V4l4 3-8 10"/></svg></span><span class="tx">블루투스</span></div>
                </div>
                <div class="gridb">
                  <div class="t lit"><span class="c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M19 12a7 7 0 1 1-2-4.9"/><path d="M19 5v3h-3"/></svg></span><span class="cap">자동 회전</span></div>
                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 3h8l-1 4H9L8 3zM9 8h6l-1.3 12h-3.4L9 8z"/></svg></span><span class="cap">손전등</span></div>
                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 14l20-7-7 20-3-8-10-5z"/></svg></span><span class="cap">비행기</span></div>
                  <div class="t lit"><span class="c"><b style="font-size:8px;font-weight:900;line-height:1">N</b></span><span class="cap">NFC</span></div>

                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C7 8 6 12 8 16s8 5 11 1c-6 1-9-3-7-8 1-3 0-4 0-6z"/></svg></span><span class="cap">절전 모드</span></div>
                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="15" height="9" rx="2"/><path d="M20 11v3"/></svg></span><span class="cap">무선 배터리</span></div>
                  <div class="t lit"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 3l4 5H9v13H7V8H4l4-5zM16 21l-4-5h3V3h2v13h3l-4 5z"/></svg></span><span class="cap">모바일 데이터</span></div>
                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="8" height="8"/><rect x="13" y="4" width="8" height="8"/><rect x="3" y="14" width="8" height="6"/><rect x="13" y="14" width="8" height="6"/></svg></span><span class="cap">Windows</span></div>

                  <div class="t qr"><span class="c">
                    <span class="qrg" style="width:9px;height:9px">
                      <i class="f"></i><i class="f"></i><i></i><i class="f"></i><i class="f"></i>
                      <i class="f"></i><i></i><i class="f"></i><i></i><i class="f"></i>
                      <i></i><i class="f"></i><i class="f"></i><i class="f"></i><i></i>
                      <i class="f"></i><i></i><i class="f"></i><i></i><i class="f"></i>
                      <i class="f"></i><i class="f"></i><i></i><i class="f"></i><i class="f"></i>
                    </span>
                  </span><span class="cap">QR 코드 스캔</span></div>
                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="15" r="2" fill="currentColor"/><path d="M8 11a5 5 0 0 1 8 0M5.5 8a9 9 0 0 1 13 0"/></svg></span><span class="cap">모바일 핫스팟</span></div>
                  <div class="t"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h7l2 2h9v11H3z"/></svg></span><span class="cap">보안 폴더</span></div>
                  <div class="t lit"><span class="c"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg></span><span class="cap">위치</span></div>
                </div>
                <div class="navbar onlight">
                  <span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 5v14M12 5v14M18 5v14"/></svg></span>
                  <span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="4" width="16" height="16" rx="5"/></svg></span>
                  <span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></span>
                </div>
              </div>
            </div></div>
            <div class="desc">빠른설정에서<br>QR 코드 스캔 탭</div>
          </div>
          <div class="arrow">→</div>
          <!-- step3 -->
          <div class="step">
            <div class="lbl">STEP 3</div>
            <div class="phone"><div class="scr">
              <div class="scan2">
                <span class="gdot"></span>
                <div class="qtxt">QR 코드를 찾는 중입니다.</div>
                <div class="vf"><span class="crn tl"></span><span class="crn tr"></span><span class="crn bl"></span><span class="crn br"></span></div>
                <div class="btm">
                  <span class="rb"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 3h8l-1 4H9L8 3zM9 8h6l-1.3 12h-3.4L9 8z"/></svg></span>
                  <span class="rb img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.6" fill="currentColor"/><path d="M5 18l5-5 4 4 3-3 3 3" stroke-linejoin="round"/></svg></span>
                </div>
                <div class="navbar">
                  <span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 5v14M12 5v14M18 5v14"/></svg></span>
                  <span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="4" y="4" width="16" height="16" rx="5"/></svg></span>
                  <span class="nb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></span>
                </div>
              </div>
            </div></div>
            <div class="desc">이미지 버튼 탭 →<br>스크린샷 선택</div>
          </div>
        </div>
      </div>

      <!-- ===== iPHONE ===== -->
      <div class="col ios">
        <div class="col-head">
          <svg class="gl" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
